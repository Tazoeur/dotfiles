- sudo:
    - apt:
        - build-essential
        - libssl-dev
        - curl
        - wget
        - git
        - vim
        - neovim
        - vlc
        - fzf
        - ripgrep
        - cmake                 # alacritty
        - pkg-config            # alacritty
        - libfreetype6-dev      # alacritty
        - libfontconfig1-dev    # alacritty
        - libxcb-xfixes0-dev    # alacritty
        - libxkbcommon-dev      # alacritty
        - python3               # alacritty
        - libegl1-mesa-dev      # alacritty

- brew:
    - gh
    - glow

- shell:
    - [nvm install 16, Installing node 16 (nvm)]
    - [nvm use 16, Use node 16 (nvm)]
    - [curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh, Installing Rust]
    - [git clone git@github.com:alacritty/alacritty.git /tmp/alacritty, Cloning Alacritty]
    - [cd /tmp/alacritty && cargo build --release, Building Alacritty]
    - [/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)", Installing Brew]

- sudo:
    -shell:
        - [tic -xe "alacritty,alacritty-direct" extra/alacritty.info, Terminfo for Alacritty]
        - [cd /tmp/alacritty && cp target/release/alacritty /usr/local/bin, Add Alacritty to PATH]
        - [cd /tmp/alacritty && cp extra/logo/alacritty-term.svg /usr/share/pixmaps/Alacritty.svg, Copy Alacritty's icon]
        - [cd /tmp/alacritty && desktop-file-install extra/linux/Alacritty.desktop, Add Alacritty's desktop entry]
        - [curl -sS https://download.spotify.com/debian/pubkey_5E3C45D7B312C643.gpg | apt-key add -, Add Spotify GPG key]
        - [echo "deb http://repository.spotify.com stable non-free" | tee /etc/apt/sources.list.d/spotify.list, Add Spotify source repository]
        - [wget "https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-x64" -O /tmp/vscode.deb && dpkg -i /tmp/vscode.deb, Install vscode]
        - [wget https://discord.com/api/download?platform=linux&format=deb -O /tmp/discord.deb && dpkg -i /tmp/discord.deb, Install discord]
        - [wget https://telegram.org/dl/desktop/linux -O /tmp/telegram.tar.gz && tar -xf /tmp/telegram.tar.xz && mv /tmp/Telegram /opt/, Get Telegram in /opt]
        - [wget https://github.com/sharkdp/bat/releases/download/v0.19.0/bat_0.19.0_amd64.deb -O /tmp/bat.deb && dpkg -i /tmp/bat.deb, Install bat]
        - [wget https://github.com/sindresorhus/caprine/releases/download/v2.55.2/caprine_2.55.2_amd64.deb -O /tmp/caprine.deb && dpkg -i /tmp/caprine.deb, Install Caprine]
        - [wget -O- https://updates.signal.org/desktop/apt/keys.asc | gpg --dearmor | tee -a /usr/share/keyrings/signal-desktop-keyring.gpg > /dev/null, Add Signal GPG key]
        # - [echo 'deb \[arch=amd64 signed-by=/usr/share/keyrings/signal-desktop-keyring.gpg\] https://updates.signal.org/desktop/apt xenial main' | tee -a /etc/apt/sources.list.d/signal-xenial.list]
        - [apt update, Update apt]
        - [apt install spotify-client signal-desktop, Install programs]
        - [update-desktop-database, Update desktop database]
